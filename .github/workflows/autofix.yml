name: AI Autofix Loop V2

on:
  workflow_run:
    workflows: ["Check Mini Program"]
    types:
      - completed

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get commit message
        run: echo "COMMIT_MSG=$(git log -1 --pretty=%B)" >> $GITHUB_ENV

      - name: Check attempt limit
        run: |
          echo "$COMMIT_MSG" | grep -q "AI autofix attempt 3" && echo "STOP=1" >> $GITHUB_ENV || echo "STOP=0" >> $GITHUB_ENV

      - name: Stop if max attempts reached
        if: env.STOP == '1'
        run: echo "Max autofix reached, exiting..."

      - name: Run Autofix
        if: env.STOP != '1'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_AUTOFIX_MODEL: gpt-4.1-mini
        run: node scripts/autofix.js

      - name: Commit changes
        if: env.STOP != '1'
        run: |
          git config user.name "autofix-bot"
          git config user.email "autofix@bot.com"
          git add .
          git commit -m "AI autofix attempt ${GITHUB_RUN_NUMBER}: auto fix v2" || echo "no changes"
          git push
