name: AI Autofix Loop

on:
  workflow_run:
    workflows: ["Check Mini Program"]
    types:
      - completed

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Autofix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_AUTOFIX_MODEL: gpt-4.1-mini
        run: node scripts/autofix.js

      - name: Commit changes
        run: |
          git config user.name "autofix-bot"
          git config user.email "autofix@bot.com"
          git add .
          git commit -m "auto fix by AI" || echo "no changes"
          git push
